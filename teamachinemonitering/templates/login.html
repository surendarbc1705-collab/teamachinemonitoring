<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tea Machine Login</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

body{
margin:0;
padding:0;
background:#0f172a;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:380px;
background:#1e293b;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,255,255,.2);

}

h1{

color:white;
text-align:center;
margin-bottom:30px;

}

input{

width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
background:#334155;
color:white;

}

button{

width:100%;
padding:15px;
margin-top:25px;
background:#06b6d4;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:white;

}

button:hover{

background:#0891b2;

}

.error{

color:red;
text-align:center;
margin-top:15px;

}

</style>

</head>

<body>

<div class="login-box">

<h1>Tea Machine Login</h1>

<form action="/login" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

LOGIN

</button>

</form>

</div>

</body>

</html>
